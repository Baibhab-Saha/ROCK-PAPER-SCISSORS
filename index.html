<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock, Paper, Scissors</title>
    <link rel="stylesheet" href="./style.css" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/1HTZb02nodKhrnDdJK9/kg2XD1r9uGqPo1cUbuic+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
    />
</head>
<body>
    <h1>Lets Play!</h1>

    <div id="card">
        <button onclick="play('rock')">
            ROCK <i class="fa-solid fa-hand-back-fist"></i>
        </button>

        <button onclick="play('paper')">
           PAPER <i class="fa-solid fa-hand"></i>
        </button>

        <button onclick="play('scissors')">
          SCISSOR  <i class="fa-solid fa-hand-peace"></i>
        </button>
    </div>

    <p id="playerResult"></p>
    <p id="computerResult"></p>
    <p id="result"></p>

    <script src="./main.js"></script>
</body>
</html>
